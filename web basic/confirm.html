<!DOCTYPE html>
<html lang="en">
<head>
    <title>DLLT Form</title>
    <meta charset="utf-8"/>
    <meta name="description" content="DLLT Form" />
    <meta name="keywords" content="Forms , Course , IT, Registration" />
    <meta name="author" content="Duong Day" />
    <script src="confirm.js"></script>
</head>
<body>
    <h1>DLLT Form</h1>
    <h2>Confirmation Form</h2>
    <form method="post" action="https://.com/api.php">
        <fieldset>
            <legend>Please confirm your detail</legend>
            <p>Your name: <span id="confirm_name"></span> </p>
            <p>Your email: <span id="confirm_email"></span> </p>
            <p>Your phonenumber: <span id="confirm_phone"></span> </p>
            <p>Your age: <span id="confirm_age"></span> </p>
            <p>Your occupation: <span id="confirm_occupation"></span></p>
            <p>Your courses: <span id="confirm_courses"></span></p>
            <p>Your payment method: <span id="confirm_payment"></span></p>
            <p>Total payment: <span id="confirm_total"></span></p>
        </fieldset>
        </br>
        <input type="submit" value="Paynow">
        <input id="cancel_button" type="button" value="Cancel">
    </form>
</body>

</html>
